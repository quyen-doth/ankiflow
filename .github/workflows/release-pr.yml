name: Release PR

on:
    push:
        branches: [develop]
    workflow_dispatch: {}

permissions:
    contents: read
    pull-requests: write

concurrency:
    group: release-pr-develop-to-main
    cancel-in-progress: false

jobs:
    create-release-pr:
        runs-on: ubuntu-latest
        timeout-minutes: 5

        steps:
            - name: Create or update release PR
              uses: actions/github-script@v9
              with:
                  script: |
                      const base = 'main';
                      const head = 'develop';
                      const title = 'release: develop to main';
                      const { owner, repo } = context.repo;

                      const compare = await github.rest.repos.compareCommitsWithBasehead({
                        owner,
                        repo,
                        basehead: `${base}...${head}`,
                      });

                      if (compare.data.files.length === 0) {
                        core.info(`No changes between ${head} and ${base}. Skipping release PR.`);
                        return;
                      }

                      const body = [
                        `Automated release PR from \`${head}\` into \`${base}\`.`,
                        '',
                        `Triggered by commit: ${context.sha}`,
                        `Workflow run: ${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${context.runId}`,
                        '',
                        'Review CI status before merging.',
                      ].join('\n');

                      const { data: openPrs } = await github.rest.pulls.list({
                        owner,
                        repo,
                        state: 'open',
                        base,
                        head: `${owner}:${head}`,
                        per_page: 1,
                      });

                      if (openPrs.length > 0) {
                        const number = openPrs[0].number;
                        core.info(`Release PR #${number} already exists. Skipping creation.`);
                        return;
                      }

                      const { data: created } = await github.rest.pulls.create({
                        owner,
                        repo,
                        base,
                        head,
                        title,
                        body,
                      });
                      core.info(`Created release PR #${created.number}.`);
