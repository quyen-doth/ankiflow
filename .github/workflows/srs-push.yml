name: SRS LINE Push

on:
    schedule:
        - cron: '0 * * * *'
    workflow_dispatch: {}

jobs:
    push:
        runs-on: ubuntu-latest
        timeout-minutes: 3
        steps:
            - name: Trigger srs-push endpoint
              run: |
                  curl -fsS -X GET "${{ secrets.APP_URL }}/api/cron/srs-push" \
                       -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
