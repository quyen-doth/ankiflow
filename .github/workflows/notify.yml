name: AnkiFlow Vocabulary Review

# Schedule TẮT (2026-07-09): thay bằng GET /api/cron/srs-push (Vercel Cron, xem vercel.json).
# Lý do: scripts/send-notifications.ts KHÔNG filter user_id — gộp dữ liệu MỌI user rồi push
# vào 1 LINE_USER_ID cố định (rò rỉ chéo user). Route mới scope đúng theo 1 uid cấu hình
# qua SRS_PUSH_TARGET_UID. Giữ workflow_dispatch để chạy tay khi cần (không tự động nữa).
on:
    workflow_dispatch: {}

jobs:
    send-review:
        runs-on: ubuntu-latest
        timeout-minutes: 5

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Send review notification
              env:
                  FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
                  LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
                  LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
              run: npx tsx scripts/send-notifications.ts
