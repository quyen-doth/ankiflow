name: CI
on:
    push:
        branches: [main, develop]
    pull_request:

jobs:
    quality:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
            - run: npm ci
            - run: npx eslint .
            - run: npx tsc --noEmit
            - run: npx vitest run
